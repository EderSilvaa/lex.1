<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://api.anthropic.com https://nspauxzztflgmxjgevmo.supabase.co ws://127.0.0.1:* http://127.0.0.1:*;">
    <title>Lex - AI Legal Agent</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/pje.css">
    <link rel="stylesheet" href="styles/browser.css">
    <link rel="stylesheet" href="styles/file-manager.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">Lex</div>
            </div>

            <nav class="nav-menu">
                <button class="nav-item active" id="nav-chat" title="Chat">
                    <svg class="icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                        fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span class="label">Chat</span>
                </button>
                <button class="nav-item" id="nav-pje" title="PJe">
                    <svg class="icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                        fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                    </svg>
                    <span class="label">PJe</span>
                </button>
                <button class="nav-item" id="nav-files" title="Arquivos">
                    <svg class="icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                        fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span class="label">Arquivos</span>
                </button>
                <button class="nav-item" id="nav-history" title="Histórico">
                    <svg class="icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                        fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <span class="label">Histórico</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <button class="nav-item" id="nav-settings" title="Configurações">
                    <svg class="icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                        fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1.82.33h.09a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                    <span class="label">Configurações</span>
                </button>
            </div>
        </aside>

        <!-- Main Content (Chat Only + Floating Widget) -->
        <main class="main-content">
            <div class="chat-wrapper">
                <div class="chat-container">
                    <div class="greeting-section">
                        <h1>Olá, Eder Silva</h1>
                        <p class="subtitle">Como posso ajudar você hoje?</p>
                    </div>

                    <div id="chat-messages" class="chat-messages">
                        <!-- Messages go here -->
                    </div>

                    <div class="input-area">
                        <div class="input-wrapper">
                            <textarea placeholder="Responder..."></textarea>
                            <button class="send-btn" disabled>
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                                    <path
                                        d="M8 14a.5.5 0 0 1-.5-.5V3.707L4.354 6.854a.5.5 0 1 1-.708-.708l4-4a.5.5 0 0 1 .708 0l4 4a.5.5 0 1 1-.708.708L8.5 3.707V13.5A.5.5 0 0 1 8 14z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- File Manager View (Originally Hidden) -->
            <div class="file-manager-wrapper hidden">
                <div class="fm-sidebar">
                    <div class="fm-section-header">
                        <span class="fm-section-title">WORKSPACES</span>
                        <button id="btn-add-workspace" class="icon-btn" title="Adicionar Workspace">
                            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2"
                                fill="none">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                    </div>
                    <div id="workspace-list" class="workspace-list">
                        <!-- Items injected by JS -->
                    </div>
                </div>
                <div class="fm-main">
                    <div class="fm-header">
                        <div class="fm-title-group">
                            <h2 id="current-folder-title">Selecionar Workspace</h2>
                            <div id="current-path-display" class="path-display" style="display:none"></div>
                        </div>
                        <div class="fm-actions">
                            <button id="btn-open-folder" class="btn-secondary">Abrir Pasta</button>
                        </div>
                    </div>

                    <div id="files-list" class="files-grid">
                        <div class="empty-state">
                            <p>Selecione um workspace ou abra uma pasta</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Floating PJe Widget (Hidden by default) -->
            <div id="pje-floating-container" class="pje-widget hidden">
                <div class="pje-header">
                    <span class="pje-title">Navegador PJe</span>
                    <div class="pje-controls">
                        <button id="btn-minimize-pje" title="Minimizar">_</button>
                        <button id="btn-maximize-pje" title="Expandir">□</button>
                        <button id="btn-close-pje" title="Fechar">×</button>
                    </div>
                </div>
                <!-- Browser Tabs (Optional, can be simplified) -->
                <div class="browser-tabs" id="browser-tabs-bar">
                    <!-- Tabs injected by JS -->
                </div>
                <div class="pje-viewport" id="browser-viewport"></div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/file-manager.js"></script>
</body>

</html>
